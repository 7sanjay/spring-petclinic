name: Deploy Spring Petclinic

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Set up Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Build the JAR
    - name: Build with Gradle
      run: ./gradlew clean build -x test

    # 4️⃣ Ensure SSH target directory exists
    - name: Ensure remote directory exists
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: mkdir -p /home/ubuntu/app/target

    # 5️⃣ Copy the JAR to the server
    - name: Copy JAR to remote server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "target/spring-petclinic-4.0.0-SNAPSHOT.jar"
        target: "/home/ubuntu/app/target/"
        overwrite: true

    # 6️⃣ Restart the application on the server
    - name: Restart Spring Petclinic
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /home/ubuntu/app
          # Kill any existing spring-petclinic process
          pkill -f 'java -jar spring-petclinic' || true
          sleep 2
          # Start new instance in background, detached
          JAR_FILE=target/spring-petclinic-4.0.0-SNAPSHOT.jar
          nohup setsid java -jar $JAR_FILE --server.port=8084 > /home/ubuntu/app/app.log 2>&1 < /dev/null &
          echo "Spring Petclinic started on port 8084"
