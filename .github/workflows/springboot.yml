name: Deploy Spring Petclinic

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Petclinic JAR
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to remote server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "target/spring-petclinic-4.0.0-SNAPSHOT.jar"
          target: "/home/ubuntu/app/target/"

      - name: Start Spring Petclinic on remote server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/ubuntu/app
            # Kill any existing spring-petclinic process
            pkill -f 'java -jar spring-petclinic' || true
            sleep 2
            # Start new instance in background, detached
            JAR_FILE=target/spring-petclinic-4.0.0-SNAPSHOT.jar
            nohup setsid java -jar $JAR_FILE --server.port=8084 > /home/ubuntu/app/app.log 2>&1 < /dev/null &
            echo "Spring Petclinic started on port 8084"
