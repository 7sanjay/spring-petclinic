name: Spring Petclinic CI + SonarQube + Artifact

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: self-hosted

    services:
      # Postgres for integration tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: petclinic
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Ensure Docker is running
      - name: Ensure Docker is running
        run: |
          sudo systemctl start docker
          docker info

      # 4️⃣ Clean previous builds
      - name: Maven clean
        run: mvn clean

      # 5️⃣ Run Maven tests (skip PostgresIntegrationTests)
      - name: Run Maven tests (skip PostgresIntegrationTests)
        run: mvn test -Dtest=!PostgresIntegrationTests

      # 6️⃣ Build Maven package (JAR artifact)
      - name: Build Maven package
        run: mvn package -DskipTests

      # 7️⃣ Upload the JAR as a workflow artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-petclinic-jar
          path: target/*.jar

      # 8️⃣ Run SonarQube analysis
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=spring-petclinic \
            -Dsonar.host.url=http://YOUR_SONARQUBE_URL:9000 \
            -Dsonar.login=$SONAR_TOKEN
